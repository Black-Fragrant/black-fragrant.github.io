<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="optionBar">
        <img id="optionIcon" src="icon.png" alt="Icon">
    
        <div id="navLinks">
            <div class="navLink" onclick="location.href='index.html'">Home</div>
            <div class="navLink">Fire Gold</div>
            <div class="navLink">Fire Black</div>
            <div class="navLink">Art</div>
            <div class="navLink">Commission</div>
        </div>
    </div>

    <!-- Top Banner with cycling/panning image -->
    <div id="topBanner">
        <img id="bannerImage" src="" alt="">
    </div>

    <!-- Floating Dark Mode Button -->
    <button id="darkModeToggle">Dark Mode</button>

    <!-- Page Content -->
    <h1>BlackFragrant</h1>
    <p>Welcome to the beginning.</p>

    <!-- Scripts -->
    <script>
        console.log("Script is running!");

        /* -------------------------------
           DARK MODE TOGGLE
        --------------------------------*/
        const button = document.getElementById('darkModeToggle');
        const body = document.body;

        button.addEventListener('click', () => {
            body.classList.toggle('dark-mode');

            if (body.classList.contains('dark-mode')) {
                button.textContent = 'Light Mode';
            } else {
                button.textContent = 'Dark Mode';
            }
        });


/* -------------------------------
   CYCLING + SMART PANNING BANNER
--------------------------------*/

const bannerImages = [
    'banner1.png',
    'banner2.png',
    'banner3.png'
];

const banner = document.getElementById('topBanner');
const img = document.getElementById('bannerImage');

let currentIndex = 0;
let panAnimation = null;

function loadBannerImage(index) {
    const src = bannerImages[index];
    const temp = new Image();
    temp.src = src;

    temp.onload = () => {
        img.style.opacity = 0;

        setTimeout(() => {
            img.src = src;

            const imgWidth = temp.width;
            const visibleWidth = 1920;

            img.style.left = "0px";
            img.style.opacity = 1;

            if (panAnimation) cancelAnimationFrame(panAnimation);

            if (imgWidth > visibleWidth) {
                const extra = imgWidth - visibleWidth;
                const duration = 8000;
                const speed = extra / (duration / 1000);

                let startTime = null;

                function pan(timestamp) {
                    if (!startTime) startTime = timestamp;
                    const elapsed = timestamp - startTime;

                    const offset = Math.min(extra, (elapsed / 1000) * speed);
                    img.style.left = `-${offset}px`;

                    if (elapsed < duration) {
                        panAnimation = requestAnimationFrame(pan);
                    }
                }

                panAnimation = requestAnimationFrame(pan);
            } else {
                img.style.left = "0px";
            }
        }, 300);
    };
}

function cycleBanner() {
    currentIndex = (currentIndex + 1) % bannerImages.length;
    loadBannerImage(currentIndex);
}

loadBannerImage(0);
setInterval(cycleBanner, 8000);

    </script>
